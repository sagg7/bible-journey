flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

  # Android adaptive icon (API 26+)
  adaptive_icon_background: "#0B1324"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
