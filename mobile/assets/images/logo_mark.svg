<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <!-- Book pages -->
    <linearGradient id="pL" x1="1" y1="0.5" x2="0" y2="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8B79E8"/>
      <stop offset="100%" stop-color="#BEB0FF"/>
    </linearGradient>
    <linearGradient id="pR" x1="0" y1="0.5" x2="1" y2="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6D5BFF"/>
      <stop offset="100%" stop-color="#4030A0"/>
    </linearGradient>
    <!-- Flame ribbon -->
    <linearGradient id="flm" x1="0.4" y1="1" x2="0.6" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#4B30D0"/>
      <stop offset="35%"  stop-color="#7B60FF"/>
      <stop offset="75%"  stop-color="#9E8AFF"/>
      <stop offset="100%" stop-color="#C8B8FF"/>
    </linearGradient>
    <!-- Spine -->
    <linearGradient id="spn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#E8C060"/>
      <stop offset="50%" stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#B88030"/>
    </linearGradient>
    <!-- Gold dot -->
    <radialGradient id="dot" cx="32%" cy="28%" r="68%">
      <stop offset="0%"  stop-color="#FFF4C0"/>
      <stop offset="55%" stop-color="#D4A030"/>
      <stop offset="100%" stop-color="#906010"/>
    </radialGradient>
  </defs>

  <!-- ── LEFT PAGES (5 layers, back → front, wing spread) ─────────── -->
  <path d="M 200 305 Q 135 272 42 222 Q 28 285 42 335 Q 128 348 200 376 Z"
        fill="#5040A8" opacity="0.45"/>
  <path d="M 200 305 Q 122 263 34 208 Q 20 274 34 324 Q 120 340 200 374 Z"
        fill="#6452B8" opacity="0.55"/>
  <path d="M 200 305 Q 110 254 26 194 Q 12 262 26 313 Q 112 330 200 372 Z"
        fill="#7864C8" opacity="0.70"/>
  <path d="M 200 305 Q 98 244 18 180 Q 4 252 18 302 Q 100 320 200 370 Z"
        fill="#9280D8" opacity="0.85"/>
  <path d="M 200 305 Q 86 236 12 167 Q -2 242 12 292 Q 88 313 200 368 Z"
        fill="url(#pL)"/>

  <!-- ── RIGHT PAGES (symmetric) ──────────────────────────────────── -->
  <path d="M 200 305 Q 265 272 358 222 Q 372 285 358 335 Q 272 348 200 376 Z"
        fill="#3020A0" opacity="0.45"/>
  <path d="M 200 305 Q 278 263 366 208 Q 380 274 366 324 Q 280 340 200 374 Z"
        fill="#3828A8" opacity="0.55"/>
  <path d="M 200 305 Q 290 254 374 194 Q 388 262 374 313 Q 288 330 200 372 Z"
        fill="#4030B0" opacity="0.70"/>
  <path d="M 200 305 Q 302 244 382 180 Q 396 252 382 302 Q 300 320 200 370 Z"
        fill="#5038B8" opacity="0.85"/>
  <path d="M 200 305 Q 314 236 388 167 Q 402 242 388 292 Q 312 313 200 368 Z"
        fill="url(#pR)"/>

  <!-- ── BOOK BODY ──────────────────────────────────────────────────── -->
  <path d="M 12 292 Q 100 313 200 368 Q 300 313 388 292 L 392 400
           Q 300 420 200 428 Q 100 420 8 400 Z"
        fill="#1A1050" opacity="0.5"/>

  <!-- ── BASE BAR ───────────────────────────────────────────────────── -->
  <rect x="8"  y="415" width="384" height="12" rx="6" fill="#BB8030"/>
  <rect x="20" y="415" width="360" height="4"  rx="2" fill="#E0C060" opacity="0.5"/>

  <!-- ── SPINE ──────────────────────────────────────────────────────── -->
  <rect x="191" y="294" width="18" height="126" rx="4" fill="url(#spn)"/>
  <rect x="195" y="298" width="5"  height="116" rx="2" fill="white" opacity="0.30"/>

  <!-- ── FLAME RIBBON (closed S-curve path) ────────────────────────── -->
  <path d="
    M 197 296
    C 155 248 218 188 192 118
    C 180 80  195 55  203 44
    Q 210 38  217 44
    C 228 55  240 80  226 118
    C 204 188 248 248 206 296
    Q 201 302 197 296
    Z"
    fill="url(#flm)" opacity="0.93"/>

  <!-- Inner highlight (3-D depth) -->
  <path d="
    M 200 293
    C 170 250 222 198 200 138
    C 192 110 198 80  204 58
    C 208 80  212 110 208 138
    C 196 195 220 248 204 290
    Z"
    fill="#D0C0FF" opacity="0.28"/>

  <!-- ── TIMELINE CONNECTOR ─────────────────────────────────────────── -->
  <path d="M 185 258 C 196 220 224 174 218 122 C 214 94 212 66 215 48"
        stroke="#C89030" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- ── GOLD DOTS ──────────────────────────────────────────────────── -->
  <!-- Bottom -->
  <circle cx="184" cy="256" r="15"   fill="#905818"/>
  <circle cx="184" cy="256" r="10.5" fill="url(#dot)"/>
  <circle cx="180" cy="251" r="3.5"  fill="white" opacity="0.70"/>

  <!-- Middle -->
  <circle cx="222" cy="164" r="15"   fill="#905818"/>
  <circle cx="222" cy="164" r="10.5" fill="url(#dot)"/>
  <circle cx="218" cy="159" r="3.5"  fill="white" opacity="0.70"/>

  <!-- Top -->
  <circle cx="215" cy="72"  r="15"   fill="#905818"/>
  <circle cx="215" cy="72"  r="10.5" fill="url(#dot)"/>
  <circle cx="211" cy="67"  r="3.5"  fill="white" opacity="0.70"/>
</svg>
