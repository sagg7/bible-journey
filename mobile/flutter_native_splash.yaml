flutter_native_splash:
  # Background color — Deep Navy
  color: "#0B1324"
  color_dark: "#0B1324"

  # Logo centered on the splash
  image: assets/icon/icon.png
  image_dark: assets/icon/icon.png

  # Android 12+ splash
  android_12:
    color: "#0B1324"
    color_dark: "#0B1324"
    image: assets/icon/icon.png
    icon_background_color: "#0B1324"

  # Platform targets
  android: true
  ios: true
  web: false
